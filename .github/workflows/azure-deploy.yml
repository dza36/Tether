name: Deploy Tether to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Generate version and inject config
        run: |
          VER="0.2.$(git rev-list --count HEAD)"
          echo "const APP_VERSION = \"$VER\";" > version.js
          sed -i "s/?v=[^\"']*/?v=$VER/g" index.html
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" config.js
          sed -i "s|__SUPABASE_ANON__|${{ secrets.SUPABASE_ANON }}|g" config.js
          sed -i "s|__AUTH_PROVIDERS__|${{ secrets.AUTH_PROVIDERS }}|g" config.js
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "/"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
