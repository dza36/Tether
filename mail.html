<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tether Mail</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=0"></script>
<script src="version.js?v=0"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0e17; color: #e8e6f0; padding: 24px 16px 100px; max-width: 720px; margin: 0 auto; }
  #gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; text-align: center; color: #7c77a0; font-size: .9rem; }
  #app { display: none; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #c4beff; }
  .top a { font-size: .8rem; color: #6c63ff; text-decoration: none; }
  .top a:hover { text-decoration: underline; }
  .empty { text-align: center; color: #7c77a0; padding: 60px 0; font-size: .9rem; }
  .msg { background: #1a1726; border-radius: 12px; margin-bottom: 10px; overflow: hidden; cursor: pointer; transition: background .15s; }
  .msg:hover { background: #1e1b2e; }
  .msg-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
  .msg-dot { width: 8px; height: 8px; border-radius: 50%; background: #6c63ff; flex-shrink: 0; }
  .msg-dot.read { background: transparent; }
  .msg-cat { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 2px 8px; border-radius: 5px; flex-shrink: 0; }
  .cat-bug { background: #2e1a1a; color: #f87171; }
  .cat-suggestion { background: #1a2230; color: #60a5fa; }
  .cat-flattery { background: #1a2e22; color: #4ade80; }
  .cat-none { background: #1e1b2e; color: #7c77a0; }
  .msg-flag { font-size: .85rem; flex-shrink: 0; }
  .msg-preview { flex: 1; font-size: .88rem; color: #a09ac0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-preview.unread { color: #e8e6f0; font-weight: 500; }
  .msg-time { font-size: .72rem; color: #7c77a0; flex-shrink: 0; }
  .msg-user { font-size: .75rem; color: #7c77a0; flex-shrink: 0; }
  .msg-body { display: none; padding: 0 14px 14px; font-size: .9rem; line-height: 1.6; color: #c4beff; border-top: 1px solid #2a2540; padding-top: 12px; }
  .msg-body.open { display: block; }
  .msg-actions { display: flex; gap: 8px; margin-top: 12px; }
  .act-btn { border: none; border-radius: 8px; padding: 6px 14px; font-size: .78rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .act-btn:hover { opacity: .8; }
  .act-read { background: #1e2030; color: #7c77a0; }
  .act-unread { background: #2d2860; color: #c4beff; }
  .act-flag { background: #2e2a10; color: #fbbf24; }
  .act-unflag { background: #1e1b2e; color: #7c77a0; }
  .section-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #7c77a0; margin: 20px 0 8px; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4ade80; color: #0a1f12; padding: 10px 20px; border-radius: 10px; font-weight: 700; font-size: .88rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="gate">Checking access…</div>
<div id="app">
  <div class="top">
    <h1>📬 Mail</h1>
    <a href="/qa">← Back to QA</a>
  </div>
  <div id="mailList"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let allFeedback = [];
let openId = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) { document.getElementById('gate').textContent = 'Not signed in.'; return; }
  const { data: user } = await sb.from('users').select('subscription_tier').eq('id', session.user.id).single();
  if (!user || !['creator','employee'].includes(user.subscription_tier)) {
    window.location.replace('/');
    return;
  }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadMail();
}

async function loadMail() {
  const { data, error } = await sb.from('feedback')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { document.getElementById('mailList').innerHTML = '<div class="empty">Could not load feedback.</div>'; return; }
  const rows = data || [];
  const userIds = [...new Set(rows.map(f => f.user_id).filter(Boolean))];
  let userMap = {};
  if (userIds.length) {
    const { data: users } = await sb.from('users').select('id, display_name, email').in('id', userIds);
    (users || []).forEach(u => { userMap[u.id] = u; });
  }
  allFeedback = rows.map(f => ({ ...f, _user: userMap[f.user_id] || null }));
  renderMail();
}

function renderMail() {
  const el = document.getElementById('mailList');
  if (!allFeedback.length) { el.innerHTML = '<div class="empty">No feedback yet.</div>'; return; }

  const unread  = allFeedback.filter(f => !f.read && !f.flagged);
  const flagged = allFeedback.filter(f => f.flagged);
  const read    = allFeedback.filter(f => f.read && !f.flagged);

  let html = '';
  if (unread.length)  html += `<div class="section-label">Unread (${unread.length})</div>`  + unread.map(msgHTML).join('');
  if (flagged.length) html += `<div class="section-label">Flagged (${flagged.length})</div>` + flagged.map(msgHTML).join('');
  if (read.length)    html += `<div class="section-label">Read</div>`                        + read.map(msgHTML).join('');
  el.innerHTML = html;
}

function msgHTML(f) {
  const catClass = f.category ? `cat-${f.category}` : 'cat-none';
  const catLabel = f.category ? f.category.charAt(0).toUpperCase() + f.category.slice(1) : 'No category';
  const preview  = f.message || '(no message)';
  const time     = new Date(f.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  const user     = f._user?.display_name || f._user?.email || 'Anonymous';
  const isOpen   = openId === f.id;
  return `
    <div class="msg" id="msg-${f.id}" onclick="toggleMsg('${f.id}')">
      <div class="msg-header">
        <div class="msg-dot${f.read ? ' read' : ''}"></div>
        <span class="msg-cat ${catClass}">${catLabel}</span>
        ${f.flagged ? '<span class="msg-flag">🚩</span>' : ''}
        <span class="msg-preview${!f.read ? ' unread' : ''}">${preview}</span>
        <span class="msg-user">${user}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-body${isOpen ? ' open' : ''}">
        <div>${f.message || '<em style="color:#7c77a0">No message provided.</em>'}</div>
        <div style="margin-top:6px;font-size:.72rem;color:#7c77a0">v${f.app_version || '?'} · ${f._user?.display_name || f._user?.email || 'Anonymous'}</div>
        <div class="msg-actions">
          ${f.read
            ? `<button class="act-btn act-unread" onclick="event.stopPropagation();markUnread('${f.id}')">Mark unread</button>`
            : `<button class="act-btn act-read"   onclick="event.stopPropagation();markRead('${f.id}')">Mark read</button>`}
          ${f.flagged
            ? `<button class="act-btn act-unflag" onclick="event.stopPropagation();unflag('${f.id}')">Remove flag</button>`
            : `<button class="act-btn act-flag"   onclick="event.stopPropagation();flag('${f.id}')">🚩 Flag</button>`}
        </div>
      </div>
    </div>`;
}

async function toggleMsg(id) {
  openId = openId === id ? null : id;
  const f = allFeedback.find(x => x.id === id);
  if (f && !f.read && openId === id) await markRead(id, true);
  else renderMail();
}

async function markRead(id, silent = false) {
  await sb.from('feedback').update({ read: true }).eq('id', id);
  const f = allFeedback.find(x => x.id === id);
  if (f) f.read = true;
  renderMail();
  if (!silent) showToast('Marked read');
}

async function markUnread(id) {
  await sb.from('feedback').update({ read: false }).eq('id', id);
  const f = allFeedback.find(x => x.id === id);
  if (f) { f.read = false; openId = null; }
  renderMail();
  showToast('Marked unread');
}

async function flag(id) {
  await sb.from('feedback').update({ flagged: true, read: true }).eq('id', id);
  const f = allFeedback.find(x => x.id === id);
  if (f) { f.flagged = true; f.read = true; }
  renderMail();
  showToast('🚩 Flagged');
}

async function unflag(id) {
  await sb.from('feedback').update({ flagged: false }).eq('id', id);
  const f = allFeedback.find(x => x.id === id);
  if (f) f.flagged = false;
  renderMail();
  showToast('Flag removed');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
