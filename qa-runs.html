<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tether QA Runs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0e17; color: #e8e6f0; padding: 24px 16px 60px; max-width: 720px; margin: 0 auto; }
  #gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; text-align: center; color: #7c77a0; font-size: .9rem; }
  #app { display: none; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #c4beff; }
  .top a { font-size: .8rem; color: #6c63ff; text-decoration: none; }
  .top a:hover { text-decoration: underline; }
  .run-card { background: #1a1726; border-radius: 12px; margin-bottom: 12px; overflow: hidden; cursor: pointer; transition: background .15s; }
  .run-card:hover { background: #1e1b2e; }
  .run-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
  .run-meta { flex: 1; min-width: 0; }
  .run-label { font-size: .92rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run-date { font-size: .75rem; color: #7c77a0; margin-top: 2px; }
  .run-counts { display: flex; gap: 8px; flex-shrink: 0; }
  .badge { border-radius: 6px; padding: 4px 10px; font-size: .75rem; font-weight: 700; }
  .badge-pass { background: #1a2e22; color: #4ade80; }
  .badge-fail { background: #2e1a1a; color: #f87171; }
  .badge-skip { background: #1e1b2e; color: #7c77a0; }
  .chevron { color: #7c77a0; font-size: .8rem; transition: transform .2s; flex-shrink: 0; }
  .run-card.open .chevron { transform: rotate(90deg); }
  .run-detail { display: none; border-top: 1px solid #2a2540; }
  .run-card.open .run-detail { display: block; }
  .detail-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid #1a1726; font-size: .83rem; line-height: 1.4; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { flex: 1; }
  .detail-badge { border-radius: 5px; padding: 3px 9px; font-size: .72rem; font-weight: 700; flex-shrink: 0; }
  .detail-badge.pass { background: #1a2e22; color: #4ade80; }
  .detail-badge.fail { background: #2e1a1a; color: #f87171; }
  .detail-badge.untested { background: #1e1b2e; color: #7c77a0; }
  .empty { text-align: center; color: #7c77a0; font-size: .9rem; padding: 60px 0; }
  .loading { text-align: center; color: #7c77a0; font-size: .9rem; padding: 60px 0; }
</style>
</head>
<body>

<div id="gate">Checking access…</div>

<div id="app">
  <div class="top">
    <h1>QA Runs</h1>
    <a href="/qa.html">← New Run</a>
  </div>
  <div id="runList"><div class="loading">Loading…</div></div>
</div>

<script>
  const SUPABASE_URL  = 'https://gnudccfibmslzotaaerr.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdudWRjY2ZpYm1zbHpvdGFhZXJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjE2ODAsImV4cCI6MjA5MTIzNzY4MH0.H0l8uLg4PmQWqosYdzjUwa4q0Xe-5ErtNR2XtUbW5OM';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const TOTAL_TESTS = 57;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session?.user) {
      document.getElementById('gate').innerHTML = 'Please <a href="/" style="color:#6c63ff">sign in to Tether</a> first.';
      return;
    }
    const { data: user } = await sb.from('users').select('subscription_tier').eq('id', session.user.id).single();
    if (!user || !['creator','employee'].includes(user.subscription_tier)) {
      document.getElementById('gate').textContent = 'Access denied. Creator or Employee account required.';
      return;
    }
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadRuns();
  }

  async function loadRuns() {
    const { data: runs, error } = await sb.from('qa_runs')
      .select('id, run_at, label, results, submitted_by')
      .order('run_at', { ascending: false });

    const container = document.getElementById('runList');
    if (error) { container.innerHTML = `<div class="empty">Error loading runs.</div>`; return; }
    if (!runs?.length) { container.innerHTML = `<div class="empty">No runs yet. <a href="/qa.html" style="color:#6c63ff">Start one →</a></div>`; return; }

    container.innerHTML = runs.map(run => {
      const results = run.results || {};
      const entries = Object.values(results);
      const passed  = entries.filter(r => r.result === 'pass').length;
      const failed  = entries.filter(r => r.result === 'fail').length;
      const tested  = entries.length;
      const untested = TOTAL_TESTS - tested;
      const date = new Date(run.run_at).toLocaleString(undefined, { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });

      const detailRows = Object.entries(results).map(([id, { label, result }]) =>
        `<div class="detail-row">
          <span class="detail-label">${escHtml(label)}</span>
          <span class="detail-badge ${result}">${result}</span>
        </div>`
      ).join('');

      const untestedNote = untested > 0
        ? `<div class="detail-row"><span class="detail-label" style="color:#7c77a0">${untested} test${untested !== 1 ? 's' : ''} not evaluated</span><span class="detail-badge untested">untested</span></div>`
        : '';

      return `<div class="run-card" onclick="toggleRun(this)">
        <div class="run-header">
          <div class="run-meta">
            <div class="run-label">${escHtml(run.label || 'Unlabeled run')}</div>
            <div class="run-date">${date}</div>
          </div>
          <div class="run-counts">
            <span class="badge badge-pass">${passed} pass</span>
            <span class="badge badge-fail">${failed} fail</span>
            ${untested > 0 ? `<span class="badge badge-skip">${untested} skip</span>` : ''}
          </div>
          <span class="chevron">▶</span>
        </div>
        <div class="run-detail">${detailRows}${untestedNote}</div>
      </div>`;
    }).join('');
  }

  function toggleRun(card) {
    card.classList.toggle('open');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
