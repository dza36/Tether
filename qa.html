<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tether QA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0e17; color: #e8e6f0; padding: 24px 16px 60px; max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; color: #c4beff; }
  .subtitle { font-size: .8rem; color: #7c77a0; margin-bottom: 24px; }
  .progress-bar-wrap { background: #1e1b2e; border-radius: 8px; height: 8px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar { height: 100%; background: #6c63ff; border-radius: 8px; transition: width .3s; }
  .progress-label { font-size: .75rem; color: #7c77a0; margin-top: 6px; margin-bottom: 24px; }
  section { margin-bottom: 28px; }
  h2 { font-size: .75rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #6c63ff; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #1e1b2e; }
  label { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; transition: background .15s; font-size: .88rem; line-height: 1.4; }
  label:hover { background: #1a1726; }
  label.checked { color: #4d4870; text-decoration: line-through; }
  input[type=checkbox] { appearance: none; width: 18px; height: 18px; min-width: 18px; border: 2px solid #4d4870; border-radius: 5px; cursor: pointer; margin-top: 1px; transition: background .15s, border-color .15s; }
  input[type=checkbox]:checked { background: #6c63ff; border-color: #6c63ff; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5l3.5 3.5L11 1' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-size: 70%; background-repeat: no-repeat; background-position: center; }
  .actions { display: flex; gap: 10px; margin-bottom: 20px; }
  button { border: none; border-radius: 8px; padding: 8px 16px; font-size: .82rem; font-weight: 600; cursor: pointer; }
  .btn-reset { background: #1e1b2e; color: #7c77a0; }
  .btn-reset:hover { background: #2a2540; }
</style>
</head>
<body>

<h1>Tether QA Checklist</h1>
<p class="subtitle">Clears automatically when you close this tab.</p>

<div class="progress-bar-wrap"><div class="progress-bar" id="bar"></div></div>
<div class="progress-label" id="progressLabel">0 / 0 complete</div>

<div class="actions">
  <button class="btn-reset" onclick="resetAll()">Clear All</button>
</div>

<!-- ─── AUTH ──────────────────────────────────────────────────────────────── -->
<section>
  <h2>Auth</h2>
  <label><input type="checkbox" data-id="auth-1"/> Google OAuth sign-in completes and lands on app</label>
  <label><input type="checkbox" data-id="auth-2"/> Lock screen → unlock → checkboxes respond and writes persist</label>
  <label><input type="checkbox" data-id="auth-3"/> Sign out → auth screen shown, no app state visible</label>
  <label><input type="checkbox" data-id="auth-4"/> Reassurance copy appears between OAuth buttons and "or use email" divider</label>
</section>

<!-- ─── TASKS ─────────────────────────────────────────────────────────────── -->
<section>
  <h2>Tasks — Core</h2>
  <label><input type="checkbox" data-id="task-1"/> Create interval task — appears on Today tab with correct due badge</label>
  <label><input type="checkbox" data-id="task-2"/> Create weekday task — appears on correct day</label>
  <label><input type="checkbox" data-id="task-3"/> Create one-time task — appears on Today or Upcoming correctly</label>
  <label><input type="checkbox" data-id="task-4"/> Swipe right → task completes, toast shown, task moves / recurs correctly</label>
  <label><input type="checkbox" data-id="task-5"/> Swipe right on task with checklist → confirm sheet appears</label>
  <label><input type="checkbox" data-id="task-6"/> Swipe left → snooze sheet appears, snooze persists after refresh</label>
  <label><input type="checkbox" data-id="task-7"/> Swipe dismiss — item gone from UI and gone after refresh (not reverting)</label>
  <label><input type="checkbox" data-id="task-8"/> Edit task → changes saved, reflected immediately</label>
  <label><input type="checkbox" data-id="task-9"/> Delete task → removed, does not reappear on refresh</label>
  <label><input type="checkbox" data-id="task-10"/> Overdue badge shown for past-due tasks</label>
  <label><input type="checkbox" data-id="task-11"/> Upcoming tab shows future tasks in correct order</label>
</section>

<!-- ─── CHECKLIST ─────────────────────────────────────────────────────────── -->
<section>
  <h2>Tasks — Checklist</h2>
  <label><input type="checkbox" data-id="cl-1"/> Expand task → checklist items shown</label>
  <label><input type="checkbox" data-id="cl-2"/> Check checklist item → persists after collapse/reopen</label>
  <label><input type="checkbox" data-id="cl-3"/> Add checklist item inline → appears immediately</label>
  <label><input type="checkbox" data-id="cl-4"/> Delete checklist item → removed, no revert on refresh</label>
  <label><input type="checkbox" data-id="cl-5"/> Complete task with all checklist items checked → no confirm sheet</label>
  <label><input type="checkbox" data-id="cl-6"/> Complete task with unchecked items → confirm sheet appears</label>
</section>

<!-- ─── EVENTS ────────────────────────────────────────────────────────────── -->
<section>
  <h2>Events</h2>
  <label><input type="checkbox" data-id="ev-1"/> Create event — appears on Events tab</label>
  <label><input type="checkbox" data-id="ev-2"/> Event detail sheet opens on tap</label>
  <label><input type="checkbox" data-id="ev-3"/> Edit event → changes saved</label>
  <label><input type="checkbox" data-id="ev-4"/> Delete event → removed after confirm</label>
  <label><input type="checkbox" data-id="ev-5"/> Bring list — add item, appears on list</label>
  <label><input type="checkbox" data-id="ev-6"/> Bring list — claim item as "bringing"</label>
  <label><input type="checkbox" data-id="ev-7"/> Navigate button launches Google Maps with event address</label>
  <label><input type="checkbox" data-id="ev-8"/> Past events hidden / archived correctly</label>
</section>

<!-- ─── GROCERY ───────────────────────────────────────────────────────────── -->
<section>
  <h2>Grocery</h2>
  <label><input type="checkbox" data-id="gr-1"/> Create grocery task → "Save &amp; Add Items" opens panel then quick-add sheet</label>
  <label><input type="checkbox" data-id="gr-2"/> Chip grid loads, tapping chip selects/deselects correctly</label>
  <label><input type="checkbox" data-id="gr-3"/> Confirm adds selected chips to list, sheet closes</label>
  <label><input type="checkbox" data-id="gr-4"/> Items grouped by department on list view</label>
  <label><input type="checkbox" data-id="gr-5"/> Emoji shown correctly per item (not dept fallback)</label>
  <label><input type="checkbox" data-id="gr-6"/> FAB shows "＋ Add Items" when list empty, "✎ Edit List" when items present</label>
  <label><input type="checkbox" data-id="gr-7"/> Qty +/– works: integer steps for count, 0.5 steps for weight items</label>
  <label><input type="checkbox" data-id="gr-8"/> Direct-entry qty input updates correctly without scroll reset</label>
  <label><input type="checkbox" data-id="gr-9"/> Size pills (S/M/L/XL) appear for volume items, tap-same deselects</label>
  <label><input type="checkbox" data-id="gr-10"/> Inline custom add from list view (Enter or Add button) — appears in misc dept</label>
  <label><input type="checkbox" data-id="gr-11"/> Custom add from Add Items sheet (name + dept select) — appears correctly</label>
  <label><input type="checkbox" data-id="gr-12"/> Check off item on list → stays checked, not reset on reopen</label>
  <label><input type="checkbox" data-id="gr-13"/> Reopening Add Items pre-selects chips already on list</label>
  <label><input type="checkbox" data-id="gr-14"/> Removing items via Add Items → confirm panel shown when removals detected</label>
  <label><input type="checkbox" data-id="gr-15"/> Fast path (no removals) skips confirm panel</label>
  <label><input type="checkbox" data-id="gr-16"/> "Done Shopping" button hidden when list empty, visible when items present</label>
  <label><input type="checkbox" data-id="gr-17"/> "Done Shopping" completes the grocery task</label>
  <label><input type="checkbox" data-id="gr-18"/> Double-tap confirm/add does not create duplicate inserts</label>
  <label><input type="checkbox" data-id="gr-19"/> Unlock phone → grocery panel still shows correct list (no stale state)</label>
</section>

<!-- ─── HOUSEHOLD ─────────────────────────────────────────────────────────── -->
<section>
  <h2>Household</h2>
  <label><input type="checkbox" data-id="hh-1"/> Household sheet opens from profile menu</label>
  <label><input type="checkbox" data-id="hh-2"/> Create household — name saved, user shown as member</label>
  <label><input type="checkbox" data-id="hh-3"/> Invite flow — invite sent (can verify in DB if needed)</label>
  <label><input type="checkbox" data-id="hh-4"/> Assigned-to avatar shown on task rows in household context</label>
</section>

<!-- ─── ONBOARDING ────────────────────────────────────────────────────────── -->
<section>
  <h2>Onboarding</h2>
  <label><input type="checkbox" data-id="ob-1"/> New email sign-up → onboarding flow triggers</label>
  <label><input type="checkbox" data-id="ob-2"/> Onboarding completes → lands on main app</label>
  <label><input type="checkbox" data-id="ob-3"/> Returning user (onboarded=true) → onboarding skipped</label>
</section>

<!-- ─── UI / GENERAL ──────────────────────────────────────────────────────── -->
<section>
  <h2>UI / General</h2>
  <label><input type="checkbox" data-id="ui-1"/> Today / Upcoming / Events tabs switch correctly</label>
  <label><input type="checkbox" data-id="ui-2"/> Background color picker saves and persists on reload</label>
  <label><input type="checkbox" data-id="ui-3"/> Toast messages display and auto-dismiss</label>
  <label><input type="checkbox" data-id="ui-4"/> Keyboard does not obscure input fields in sheets (scrolls into view)</label>
  <label><input type="checkbox" data-id="ui-5"/> App works in PWA installed mode (add to home screen)</label>
  <label><input type="checkbox" data-id="ui-6"/> No console errors on normal flow</label>
</section>

<script>
  const STORE_KEY = 'tether-qa-session';

  function getState() {
    try { return JSON.parse(sessionStorage.getItem(STORE_KEY) || '{}'); } catch { return {}; }
  }

  function saveState(state) {
    sessionStorage.setItem(STORE_KEY, JSON.stringify(state));
  }

  function updateProgress() {
    const all = document.querySelectorAll('input[type=checkbox]');
    const checked = document.querySelectorAll('input[type=checkbox]:checked');
    const pct = all.length ? (checked.length / all.length) * 100 : 0;
    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${checked.length} / ${all.length} complete`;
  }

  function resetAll() {
    sessionStorage.removeItem(STORE_KEY);
    document.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = false;
      cb.closest('label').classList.remove('checked');
    });
    updateProgress();
  }

  // Restore session state
  const state = getState();
  document.querySelectorAll('input[type=checkbox]').forEach(cb => {
    if (state[cb.dataset.id]) {
      cb.checked = true;
      cb.closest('label').classList.add('checked');
    }
    cb.addEventListener('change', () => {
      const s = getState();
      if (cb.checked) { s[cb.dataset.id] = true; cb.closest('label').classList.add('checked'); }
      else { delete s[cb.dataset.id]; cb.closest('label').classList.remove('checked'); }
      saveState(s);
      updateProgress();
    });
  });

  updateProgress();
</script>
</body>
</html>
