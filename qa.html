<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tether QA</title>
<!--
  SQL MIGRATION — run once in Supabase SQL editor:

  CREATE TABLE qa_runs (
    id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    run_at timestamptz DEFAULT now(),
    submitted_by uuid REFERENCES users(id),
    label text,
    platform text,
    version text,
    notes text,
    results jsonb
  );
  ALTER TABLE qa_runs ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "qa_runs_access" ON qa_runs FOR ALL USING (
    EXISTS (SELECT 1 FROM users WHERE id = auth.uid() AND subscription_tier IN ('creator','employee'))
  );

  -- If upgrading existing table:
  ALTER TABLE qa_runs ADD COLUMN IF NOT EXISTS platform text;
  ALTER TABLE qa_runs ADD COLUMN IF NOT EXISTS version text;
  ALTER TABLE qa_runs ADD COLUMN IF NOT EXISTS notes text;
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0e17; color: #e8e6f0; padding: 24px 16px 100px; max-width: 720px; margin: 0 auto; }
  #gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; text-align: center; color: #7c77a0; font-size: .9rem; }
  #app { display: none; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #c4beff; }
  .top a { font-size: .8rem; color: #6c63ff; text-decoration: none; }
  .top a:hover { text-decoration: underline; }
  .version-bar { font-size: .78rem; color: #7c77a0; margin-bottom: 14px; }
  .version-bar span { color: #a78bfa; font-weight: 600; }
  .platform-row { display: flex; gap: 8px; margin: 0 0 16px; }
  .btn-platform { flex: 1; border: 2px solid #2e2a45; border-radius: 10px; padding: 9px 0; background: #1e1b2e; color: #7c77a0; font-size: .84rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-platform:hover { border-color: #6c63ff; color: #c4beff; }
  .btn-platform.active { border-color: #6c63ff; background: #2d2860; color: #c4beff; }
  .progress-bar-wrap { background: #1e1b2e; border-radius: 8px; height: 8px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 8px; transition: width .3s; background: linear-gradient(90deg, #6c63ff, #a78bfa); }
  .progress-label { font-size: .75rem; color: #7c77a0; margin: 6px 0 20px; }

  /* Sections */
  .section { margin-bottom: 10px; border-radius: 12px; overflow: hidden; background: #1a1726; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; transition: background .15s; }
  .section-header:hover { background: #1e1b2e; }
  .section-chevron { color: #7c77a0; font-size: .75rem; transition: transform .2s; flex-shrink: 0; }
  .section.open .section-chevron { transform: rotate(90deg); }
  .section-title { font-size: .78rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #6c63ff; flex: 1; }
  .section-counts { display: flex; gap: 6px; flex-shrink: 0; }
  .sc { border-radius: 5px; padding: 3px 8px; font-size: .7rem; font-weight: 700; }
  .sc-pass { background: #1a2e22; color: #4ade80; }
  .sc-fail { background: #2e1a1a; color: #f87171; }
  .sc-na { background: #1e2030; color: #7c77a0; }
  .sc-left { background: #1e1b2e; color: #7c77a0; }
  .section-body { display: none; border-top: 1px solid #2a2540; padding: 4px 0; }
  .section.open .section-body { display: block; }

  /* Sub-sections */
  .subsection { margin: 4px 8px 4px; border-radius: 8px; overflow: hidden; background: #15121f; }
  .subsection-header { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; user-select: none; transition: background .15s; }
  .subsection-header:hover { background: #1a1726; }
  .subsection-chevron { color: #7c77a0; font-size: .7rem; transition: transform .2s; flex-shrink: 0; }
  .subsection.open .subsection-chevron { transform: rotate(90deg); }
  .subsection-title { font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #a78bfa; flex: 1; }
  .subsection-body { display: none; border-top: 1px solid #2a2540; padding: 2px 0; }
  .subsection.open .subsection-body { display: block; }

  /* Test rows */
  .test-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; transition: background .15s; }
  .test-row:hover { background: #1e1b2e; }
  .test-label { flex: 1; font-size: .84rem; line-height: 1.4; }
  .test-label.pass { color: #4ade80; }
  .test-label.fail { color: #f87171; }
  .test-label.na { color: #7c77a0; text-decoration: line-through; }
  .btn-pass, .btn-fail, .btn-na { border: none; border-radius: 6px; padding: 5px 10px; font-size: .74rem; font-weight: 600; cursor: pointer; transition: opacity .15s; flex-shrink: 0; }
  .btn-pass { background: #1a2e22; color: #4ade80; }
  .btn-fail { background: #2e1a1a; color: #f87171; }
  .btn-na { background: #1e2030; color: #7c77a0; }
  .btn-pass.active { background: #4ade80; color: #0a1f12; }
  .btn-fail.active { background: #f87171; color: #2e0a0a; }
  .btn-na.active { background: #4a4a6a; color: #c4beff; }
  .btn-pass:hover, .btn-fail:hover, .btn-na:hover { opacity: .85; }
  .fail-note { display: none; width: calc(100% - 28px); margin: 0 14px 8px; padding: 8px 12px; background: #1e1214; border: 1px solid #5a2020; border-radius: 8px; color: #f0d0d0; font-size: .82rem; resize: vertical; min-height: 52px; outline: none; font-family: inherit; }
  .fail-note:focus { border-color: #f87171; }

  /* Run notes */
  .run-notes-wrap { margin-top: 20px; }
  .run-notes-label { font-size: .78rem; font-weight: 700; color: #7c77a0; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .run-notes { width: 100%; padding: 12px 14px; background: #1e1b2e; border: 1px solid #2e2a45; border-radius: 10px; color: #e8e6f0; font-size: .88rem; resize: vertical; min-height: 80px; outline: none; font-family: inherit; }
  .run-notes:focus { border-color: #6c63ff; }

  /* Bottom bar */
  .bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #0f0e17; border-top: 1px solid #1e1b2e; padding: 14px 16px; display: flex; gap: 10px; justify-content: center; }
  .btn-submit { background: #6c63ff; color: #fff; border: none; border-radius: 10px; padding: 12px 32px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: opacity .2s; }
  .btn-submit:disabled { opacity: .35; cursor: default; }
  .btn-submit:not(:disabled):hover { opacity: .85; }
  .btn-reset { background: #1e1b2e; color: #7c77a0; border: none; border-radius: 10px; padding: 12px 20px; font-size: .88rem; font-weight: 600; cursor: pointer; }
  .btn-reset:hover { background: #2a2540; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4ade80; color: #0a1f12; padding: 10px 20px; border-radius: 10px; font-weight: 700; font-size: .88rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="gate">Checking access…</div>

<div id="app">
  <div class="top">
    <h1>Tether QA</h1>
    <a href="/qa-runs.html">View Past Runs →</a>
  </div>
  <div class="version-bar">Version: <span id="versionLabel">—</span></div>
  <div class="platform-row">
    <button class="btn-platform" data-p="iOS">iOS</button>
    <button class="btn-platform" data-p="Android">Android</button>
    <button class="btn-platform" data-p="macOS">macOS</button>
    <button class="btn-platform" data-p="Windows">Windows</button>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="bar" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 evaluated</div>

  <div id="sections"></div>

  <div class="run-notes-wrap">
    <div class="run-notes-label">Run Notes</div>
    <textarea class="run-notes" id="runNotes" placeholder="Observations, suggested test additions, outdated tests to revisit…"></textarea>
  </div>

  <div style="height:80px"></div>
</div>

<div class="bottom" id="bottomBar" style="display:none">
  <button class="btn-reset" onclick="resetAll()">Clear</button>
  <button class="btn-submit" id="btnSubmit" disabled onclick="submitRun()">Submit Run</button>
</div>

<div class="toast" id="toast"></div>

  {

      { id: 'set-2', label: 'Theme — Light applies immediately and persists on reload' },
      { id: 'set-3', label: 'Theme — System follows OS preference' },
      { id: 'set-4', label: 'Color theme — each swatch changes background and accent correctly' },
      { id: 'set-5', label: 'Color theme — persists on hard refresh' },
      { id: 'set-6', label: 'Color theme — syncs across devices (verify on second device)' },
    ]
  },
  {
    id: 'ui', title: 'UI / General',
    tests: [
      { id: 'ui-1', label: 'Today / This Week / This Month tabs switch correctly' },
      { id: 'ui-2', label: 'Toast messages display and auto-dismiss' },
      { id: 'ui-3', label: 'Keyboard does not obscure input fields in sheets' },
      { id: 'ui-4', label: 'App works in PWA installed mode (add to home screen)' },
      { id: 'ui-5', label: 'No console errors on normal flow' },
      { id: 'ui-6', label: 'Version shown correctly in footer and Settings' },
      { id: 'ui-7', label: 'Auth screen shows only configured providers (no Apple/Facebook if not enabled)' },
    ]

];

const results = {};
let currentUserId = null;
let selectedPlatform = null;
let appVersion = '—';

function totalTests() {
  let n = 0;
  TEST_PLAN.forEach(s => {
    n += s.tests.length;
    (s.subsections || []).forEach(ss => { n += ss.tests.length; });
  });
  return n;
}

function buildSections() {
  const container = document.getElementById('sections');
  container.innerHTML = TEST_PLAN.map(section => {
    const subsHtml = (section.subsections || []).map(ss => `
      <div class="subsection" id="sub-${ss.id}">
        <div class="subsection-header" onclick="toggleSub('${ss.id}')">
          <span class="subsection-chevron">▶</span>
          <span class="subsection-title">${ss.title}</span>
          <div class="section-counts" id="subcounts-${ss.id}"></div>
        </div>
        <div class="subsection-body">
          ${ss.tests.map(t => testRowHtml(t)).join('')}
        </div>
      </div>`).join('');

    return `
      <div class="section" id="sec-${section.id}">
        <div class="section-header" onclick="toggleSec('${section.id}')">
          <span class="section-chevron">▶</span>
          <span class="section-title">${section.title}</span>
          <div class="section-counts" id="counts-${section.id}"></div>
        </div>
        <div class="section-body">
          ${section.tests.map(t => testRowHtml(t)).join('')}
          ${subsHtml}
        </div>
      </div>`;
  }).join('');

  // Wire up buttons
  document.querySelectorAll('.test-row').forEach(row => {
    const id = row.dataset.id;
    const label = row.querySelector('.test-label').textContent;
    const btnPass = row.querySelector('.btn-pass');
    const btnFail = row.querySelector('.btn-fail');
    const btnNa   = row.querySelector('.btn-na');
    const note = document.createElement('textarea');
    note.className = 'fail-note';
    note.placeholder = 'Describe what went wrong…';
    note.addEventListener('input', () => { if (results[id]) results[id].note = note.value.trim(); });
    row.insertAdjacentElement('afterend', note);
    btnPass.addEventListener('click', () => setResult(id, label, 'pass', row, note));
    btnFail.addEventListener('click', () => setResult(id, label, 'fail', row, note));
    btnNa.addEventListener('click',   () => setResult(id, label, 'na',   row, note));
  });
}

function testRowHtml(t) {
  return `<div class="test-row" data-id="${t.id}">
    <span class="test-label">${t.label}</span>
    <button class="btn-pass">Pass</button>
    <button class="btn-fail">Fail</button>
    <button class="btn-na">N/A</button>
  </div>`;
}

function toggleSec(id) {
  document.getElementById('sec-' + id).classList.toggle('open');
}
function toggleSub(id) {
  document.getElementById('sub-' + id).classList.toggle('open');
}

function setResult(id, label, result, row, note) {
  if (results[id]?.result === result) {
    delete results[id];
    row.querySelectorAll('.btn-pass,.btn-fail,.btn-na').forEach(b => b.classList.remove('active'));
    row.querySelector('.test-label').className = 'test-label';
    note.style.display = 'none'; note.value = '';
  } else {
    results[id] = { label, result };
    row.querySelectorAll('.btn-pass,.btn-fail,.btn-na').forEach(b => b.classList.remove('active'));
    row.querySelector('.btn-' + result).classList.add('active');
    row.querySelector('.test-label').className = 'test-label ' + result;
    note.style.display = result === 'fail' ? 'block' : 'none';
    if (result !== 'fail') note.value = '';
  }
  updateProgress();
  updateCounts();
}

function updateProgress() {
  const total = totalTests();
  const evaluated = Object.keys(results).length;
  const passed = Object.values(results).filter(r => r.result === 'pass').length;
  const failed = Object.values(results).filter(r => r.result === 'fail').length;
  const pct = total ? (evaluated / total) * 100 : 0;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    evaluated === 0 ? `0 / ${total} evaluated`
    : `${evaluated} / ${total} evaluated — ${passed} pass, ${failed} fail`;
  document.getElementById('btnSubmit').disabled = evaluated === 0;
}

function updateCounts() {
  TEST_PLAN.forEach(section => {
    const allTests = [...section.tests, ...(section.subsections || []).flatMap(ss => ss.tests)];
    setCounts('counts-' + section.id, allTests);
    (section.subsections || []).forEach(ss => {
      setCounts('subcounts-' + ss.id, ss.tests);
    });
  });
}

function setCounts(elId, tests) {
  const el = document.getElementById(elId);
  if (!el) return;
  const pass = tests.filter(t => results[t.id]?.result === 'pass').length;
  const fail = tests.filter(t => results[t.id]?.result === 'fail').length;
  const na   = tests.filter(t => results[t.id]?.result === 'na').length;
  const left = tests.length - pass - fail - na;
  el.innerHTML = [
    pass ? `<span class="sc sc-pass">${pass} pass</span>` : '',
    fail ? `<span class="sc sc-fail">${fail} fail</span>` : '',
    na   ? `<span class="sc sc-na">${na} n/a</span>`   : '',
    left ? `<span class="sc sc-left">${left} left</span>` : '',
  ].join('');
}

function resetAll() {
  Object.keys(results).forEach(k => delete results[k]);
  document.querySelectorAll('.btn-pass,.btn-fail,.btn-na').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.test-label').forEach(l => l.className = 'test-label');
  document.querySelectorAll('.fail-note').forEach(n => { n.style.display = 'none'; n.value = ''; });
  document.getElementById('runNotes').value = '';
  selectedPlatform = null;
  document.querySelectorAll('.btn-platform').forEach(b => b.classList.remove('active'));
  updateProgress();
  updateCounts();
}

async function submitRun() {
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  const platformPrefix = selectedPlatform ? `[${selectedPlatform}] ` : '';
  const label = (platformPrefix + 'v' + appVersion).trim();
  const { error } = await sb.from('qa_runs').insert({
    submitted_by: currentUserId,
    label,
    platform: selectedPlatform,
    version: appVersion,
    notes: document.getElementById('runNotes').value.trim() || null,
    results
  });
  if (error) {
    showToast('Error: ' + error.message, true);
    btn.disabled = false;
    btn.textContent = 'Submit Run';
  } else {
    showToast('Run submitted!');
    setTimeout(() => window.location.href = '/qa-runs.html', 1200);
  }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#f87171' : '#4ade80';
  t.style.color = isError ? '#2e0a0a' : '#0a1f12';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) {
    document.getElementById('gate').innerHTML = 'Please <a href="/" style="color:#6c63ff">sign in to Tether</a> first.';
    return;
  }
  const { data: user } = await sb.from('users').select('subscription_tier').eq('id', session.user.id).single();
  if (!user || !['creator','employee'].includes(user.subscription_tier)) {
    document.getElementById('gate').textContent = 'Access denied. Creator or Employee account required.';
    return;
  }
  currentUserId = session.user.id;

  // Get version
  try {
    const r = await fetch('/version.js?v=' + Date.now());
    const text = await r.text();
    const match = text.match(/"([^"]+)"/);
    if (match) appVersion = match[1];
  } catch(_) {}
  document.getElementById('versionLabel').textContent = appVersion;

  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('bottomBar').style.display = 'flex';

  buildSections();
  updateProgress();
  updateCounts();

  document.querySelectorAll('.btn-platform').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPlatform = selectedPlatform === btn.dataset.p ? null : btn.dataset.p;
      document.querySelectorAll('.btn-platform').forEach(b => b.classList.toggle('active', b.dataset.p === selectedPlatform));
    });
  });
}

init();
</script>
</body>
</html>
